<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ExileAutoPath — PoE2 build path</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font: 15px/1.5 system-ui, Segoe UI, Roboto, sans-serif; background: #13151a; color: #e7e3d6; }
      header { padding: 20px; border-bottom: 1px solid #2a2e39; }
      header h1 { margin: 0; font-size: 20px; color: #caa85a; }
      header p { margin: 2px 0 0; color: #9a958a; font-size: 13px; }
      .wrap { max-width: 920px; margin: 0 auto; padding: 20px; }
      .panel { background: #1b1e26; border: 1px solid #2a2e39; border-radius: 10px; padding: 16px; }
      textarea { width: 100%; height: 96px; resize: vertical; background: #23262f; color: #e7e3d6; border: 1px solid #30343f; border-radius: 8px; padding: 10px; font: 12px/1.4 ui-monospace, Consolas, monospace; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
      button, select, label.file { background: #2a2e39; color: #e7e3d6; border: 1px solid #3a3f4d; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 14px; }
      button.primary { background: #caa85a; color: #1b1207; border-color: #caa85a; font-weight: 600; }
      button:disabled { opacity: 0.5; cursor: default; }
      label.file input { display: none; }
      .hint { color: #8a857a; font-size: 12px; }
      .status { margin-top: 10px; font-size: 13px; min-height: 18px; }
      .status.err { color: #ff9b9b; }
      .status.warn { color: #e6cf94; }
      iframe { width: 100%; min-height: 720px; border: 1px solid #2a2e39; border-radius: 10px; margin-top: 16px; background: #13151a; }
      a { color: #6fa8d6; }
      #treePanel { margin-top: 16px; display: none; }
      #treePanel h2 { font-size: 16px; color: #caa85a; margin: 0 0 8px; }
      .legend { font-size: 12px; color: #9a958a; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
      .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
      #tree { width: 100%; height: 580px; background: #0f1115; border: 1px solid #2a2e39; border-radius: 10px; touch-action: none; cursor: grab; display: block; }
      #tree:active { cursor: grabbing; }
      #tree .edges { stroke: #262b37; stroke-width: 8; fill: none; }
      #tree .edgesAdd { stroke: #3f6b50; stroke-width: 14; fill: none; }
      #tree circle.n { fill: #353b49; }
      #tree circle.nn { fill: #59617a; }
      #tree circle.nk { fill: #9a7fc0; }
      #tree circle.nt { fill: #5fae7a; }
      #tree circle.nu { fill: #caa85a; }
    </style>
  </head>
  <body>
    <header>
      <h1>ExileAutoPath</h1>
      <p>Paste your Path of Building 2 code (or upload a file) to find the closest meta build, the path to it, and what you're low on.</p>
    </header>
    <div class="wrap">
      <div class="panel">
        <textarea id="code" placeholder="Paste your Path of Building 2 import code here…&#10;(In PoB2: Import/Export → Generate/Copy. Or paste a pobb.in / mobalytics build code.)"></textarea>
        <div class="row">
          <label class="file">Upload .txt / .pob<input type="file" id="file" accept=".txt,.pob,.xml,text/plain" /></label>
          <select id="league" title="League corpus"></select>
          <button class="primary" id="go">Analyze ▸</button>
          <span class="hint" id="engineHint"></span>
        </div>
        <div class="status" id="status"></div>
      </div>
      <iframe id="report" title="report" sandbox="allow-popups allow-popups-to-escape-sandbox"></iframe>

      <div id="treePanel">
        <h2>Passive tree</h2>
        <div class="legend">
          <span><i style="background:#caa85a"></i>your allocation</span>
          <span><i style="background:#5fae7a"></i>nodes the #1 build adds</span>
          <span><i style="background:#9a7fc0"></i>keystone</span>
          <span><i style="background:#59617a"></i>notable</span>
          <button id="fit">Fit</button>
          <span class="hint">scroll to zoom · drag to pan</span>
        </div>
        <svg id="tree" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>

    <script type="module">
      const $ = (id) => document.getElementById(id);
      const status = (msg, cls = "") => { $("status").className = "status " + cls; $("status").textContent = msg; };

      // Populate leagues + engine hint.
      try {
        const [leagues, health] = await Promise.all([
          fetch("/api/leagues").then((r) => r.json()),
          fetch("/api/health").then((r) => r.json()),
        ]);
        const sel = $("league");
        if (!leagues.leagues.length) {
          sel.innerHTML = '<option value="">(no corpus — run: npm run cli -- corpus)</option>';
        } else {
          sel.innerHTML = leagues.leagues
            .map((l) => `<option value="${l.name}">${l.name} (${l.builds})</option>`)
            .join("");
        }
        if (!health.engine) $("engineHint").textContent = "engine offline — stats/survival disabled";
      } catch {
        status("Could not reach the server.", "err");
      }

      // File upload -> fill the textarea.
      $("file").addEventListener("change", async (e) => {
        const f = e.target.files?.[0];
        if (!f) return;
        $("code").value = (await f.text()).trim();
        status(`Loaded ${f.name}.`);
      });

      // ---- passive tree ----
      let TREE = null;
      let vb = null;
      const svg = $("tree");

      async function loadTree() {
        if (TREE) return TREE;
        const t = await fetch("/tree-0_5.json").then((r) => r.json());
        t.byId = new Map(t.nodes.map((n) => [n.id, n]));
        TREE = t;
        return t;
      }
      function setViewBox(x, y, w, h) {
        vb = { x, y, w, h };
        svg.setAttribute("viewBox", `${x} ${y} ${w} ${h}`);
      }
      async function showTree(tree) {
        if (!tree || !tree.userNodes) return;
        const t = await loadTree().catch(() => null);
        if (!t) return;
        const userSet = new Set(tree.userNodes);
        const targetSet = new Set(tree.targetNodes || []);
        const inSet = (id) => userSet.has(id) || targetSet.has(id);
        let base = "", add = "";
        for (const n of t.nodes) {
          if (!n.c) continue;
          for (const cid of n.c) {
            if (n.id >= cid) continue; // dedupe undirected edges
            const m = t.byId.get(cid);
            if (!m) continue;
            const seg = `M${n.x} ${n.y}L${m.x} ${m.y}`;
            if (inSet(n.id) && inSet(m.id)) add += seg;
            else base += seg;
          }
        }
        let circles = "";
        for (const n of t.nodes) {
          let cls = "n", r = 16;
          if (userSet.has(n.id)) { cls = "nu"; r = 62; }
          else if (targetSet.has(n.id)) { cls = "nt"; r = 54; }
          else if (n.k) { cls = "nk"; r = 42; }
          else if (n.t) { cls = "nn"; r = 26; }
          const title = (n.n || "").replace(/[<&>]/g, "");
          circles += `<circle class="${cls}" cx="${n.x}" cy="${n.y}" r="${r}">${title ? `<title>${title}</title>` : ""}</circle>`;
        }
        svg.innerHTML = `<path class="edges" d="${base}"/><path class="edgesAdd" d="${add}"/>${circles}`;

        const focus = t.nodes.filter((n) => inSet(n.id));
        let bb;
        if (focus.length) {
          const xs = focus.map((n) => n.x), ys = focus.map((n) => n.y);
          bb = { x: Math.min(...xs), y: Math.min(...ys), X: Math.max(...xs), Y: Math.max(...ys) };
        } else {
          bb = { x: t.minX, y: t.minY, X: t.maxX, Y: t.maxY };
        }
        const pad = Math.max(bb.X - bb.x, bb.Y - bb.y) * 0.2 + 600;
        TREE._fit = { x: bb.x - pad, y: bb.y - pad, w: bb.X - bb.x + 2 * pad, h: bb.Y - bb.y + 2 * pad };
        setViewBox(TREE._fit.x, TREE._fit.y, TREE._fit.w, TREE._fit.h);
        $("treePanel").style.display = "block";
      }
      svg.addEventListener("wheel", (e) => {
        e.preventDefault();
        if (!vb) return;
        const f = e.deltaY < 0 ? 0.84 : 1.19;
        const rect = svg.getBoundingClientRect();
        const mx = vb.x + ((e.clientX - rect.left) / rect.width) * vb.w;
        const my = vb.y + ((e.clientY - rect.top) / rect.height) * vb.h;
        setViewBox(mx - (mx - vb.x) * f, my - (my - vb.y) * f, vb.w * f, vb.h * f);
      }, { passive: false });
      let drag = null;
      svg.addEventListener("pointerdown", (e) => { drag = { x: e.clientX, y: e.clientY }; svg.setPointerCapture(e.pointerId); });
      svg.addEventListener("pointermove", (e) => {
        if (!drag || !vb) return;
        const rect = svg.getBoundingClientRect();
        setViewBox(vb.x - ((e.clientX - drag.x) / rect.width) * vb.w, vb.y - ((e.clientY - drag.y) / rect.height) * vb.h, vb.w, vb.h);
        drag = { x: e.clientX, y: e.clientY };
      });
      svg.addEventListener("pointerup", () => (drag = null));
      $("fit").addEventListener("click", () => { if (TREE && TREE._fit) setViewBox(TREE._fit.x, TREE._fit.y, TREE._fit.w, TREE._fit.h); });

      async function analyze() {
        const code = $("code").value.trim();
        if (!code) { status("Paste a code or upload a file first.", "warn"); return; }
        $("go").disabled = true;
        status("Analyzing… (computing stats can take a couple of seconds)");
        try {
          const res = await fetch("/api/analyze", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ code, league: $("league").value || undefined }),
          });
          const data = await res.json();
          if (!data.ok) { status(data.error || "Analyze failed.", "err"); return; }
          $("report").srcdoc = data.html;
          showTree(data.tree).catch((e) => console.error("tree render failed", e));
          const who = `${data.user.ascendancy || data.user.className} / ${data.user.mainSkill || "?"} (L${data.user.level})`;
          status(
            `${who} — matched against ${data.corpusSize} builds${data.engineError ? " · stats unavailable: " + data.engineError : ""}.`,
            data.engineError ? "warn" : "",
          );
        } catch (err) {
          status("Request failed: " + err, "err");
        } finally {
          $("go").disabled = false;
        }
      }
      $("go").addEventListener("click", analyze);
      $("code").addEventListener("keydown", (e) => { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) analyze(); });
    </script>
  </body>
</html>
